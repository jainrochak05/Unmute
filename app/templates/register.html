{% extends "base.html" %}

{% block content %}

<div style="max-width:420px; margin:4rem auto; padding:0 1rem;">

    <div class="card">

        <h2 style="
            text-align:center;
            margin-bottom:.5rem;
            color:var(--accent-gold);
        ">
            Create Account
        </h2>

        <p style="
            text-align:center;
            color:var(--text-secondary);
            margin-bottom:2rem;
        ">
            Begin your wellness journey with Unmute.
        </p>

        <form action="{{ url_for('auth.register') }}" method="POST">

            <div class="form-group">

                <label>Full Name</label>

                <input
                    type="text"
                    name="name"
                    placeholder="Enter your full name"
                    required
                    autocomplete="name"
                >

            </div>


            <div class="form-group">

                <label>Email Address</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                    autocomplete="email"
                >

            </div>


            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Minimum 6 characters"
                    minlength="6"
                    required
                    autocomplete="new-password"
                >

            </div>


            <button
                type="submit"
                class="btn-gold"
                style="
                    width:100%;
                    margin-top:.5rem;
                "
            >

                Create Account

            </button>

        </form>


        <hr style="
            margin:2rem 0;
            border:none;
            border-top:1px solid rgba(255,255,255,.08);
        ">


        <p style="
            text-align:center;
            color:var(--text-secondary);
            margin:0;
        ">

            Already have an account?

            <a
                href="{{ url_for('auth.login') }}"
                style="
                    color:var(--accent-gold);
                    text-decoration:none;
                    font-weight:600;
                "
            >

                Sign In

            </a>

        </p>

    </div>

</div>

{% endblock %}
