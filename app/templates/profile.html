{% extends "base.html" %}

{% block title %}Profile | Unmute{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div style="margin-bottom: 3rem;">
        <h1>Your Profile</h1>
        <p class="text-muted">Manage your account and preferences.</p>
    </div>

    <div class="card" style="margin-bottom: 2rem;">
        <h3 style="margin-bottom: 1.5rem;">Account Details</h3>
        <form action="{{ url_for('profile.update') }}" method="POST">
            <div class="form-group">
                <label class="text-muted" style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; text-transform: uppercase;">Username</label>
                <input type="text" name="username" value="{{ current_user.username }}" required>
            </div>
            <div class="form-group">
                <label class="text-muted" style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; text-transform: uppercase;">Email</label>
                <input type="email" name="email" value="{{ current_user.email }}" required>
            </div>
            <button type="submit" class="btn-outline">Update Info</button>
        </form>
    </div>

    <div class="card" style="border-color: #331111;">
        <h3 style="color: var(--error-red); margin-bottom: 1rem;">Danger Zone</h3>
        <p class="text-muted" style="margin-bottom: 1.5rem;">Permanently delete your account and all associated data.</p>
        <form action="{{ url_for('auth.delete_account') }}" method="POST" onsubmit="return confirm('Are you absolutely sure? This cannot be undone.');">
            <button type="submit" class="btn-outline" style="color: var(--error-red); border-color: var(--error-red);">Delete Account</button>
        </form>
    </div>
</div>
{% endblock %}
