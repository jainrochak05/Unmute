{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Welcome to Unmute</h2>
  <p>A safe emotional wellness MVP for daily reflection.</p>
  {% if not current_user.is_authenticated %}
    <a class="btn" href="{{ url_for('auth.register') }}">Get Started</a>
  {% else %}
    <a class="btn" href="{{ url_for('dashboard.dashboard_home') }}">Go to Dashboard</a>
  {% endif %}
</section>
{% endblock %}
